# golangci-lint configuration for sql-loader-go
# This config ensures high code quality standards

version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck       # Check for unchecked errors
    - govet          # Reports suspicious constructs
    - ineffassign    # Detects ineffectual assignments
    - staticcheck    # Static analysis checks
    - unused         # Checks for unused code
    - misspell       # Finds commonly misspelled words
    - revive         # Fast, configurable, extensible linter
    - gosec          # Security checks
    - goconst        # Finds repeated strings that could be constants
    - unconvert      # Unnecessary type conversions
    - unparam        # Reports unused function parameters
  exclusions:
    presets: []  # v2 equivalent of exclude-use-default: false
    rules:
      # Exclude some linters from running on tests files
      - path: _test\.go
        linters:
          - goconst
          - gosec
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    govet:
      enable-all: true
    revive:
      severity: warning
      confidence: 0.8
      rules:
        - name: exported
          severity: warning
        - name: package-comments
          severity: warning
    gosec:
      excludes:
        - G104 # Allow unhandled errors in specific cases (we use errcheck)
    misspell:
      locale: US

formatters:
  enable:
    - gofmt          # Checks if code was gofmt-ed
    - goimports      # Checks imports are formatted

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
